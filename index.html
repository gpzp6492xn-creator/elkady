<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم الخدمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-positive {
            background-color: #28a745;
            color: white;
        }

        .btn-positive:hover {
            background-color: #218838;
        }

        .btn-negative {
            background-color: #dc3545;
            color: white;
        }

        .btn-negative:hover {
            background-color: #c82333;
        }

        .icon {
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>رأيك يهمنا!</h2>
        <p>كيف كانت تجربتك معنا اليوم؟</p>

        <div class="options">
            <!-- زر التقييم الإيجابي -->
            <button onclick="handleFeedback('positive')" class="btn btn-positive">
                <span class="icon">😊</span>
                تجربة ممتازة
            </button>

            <!-- زر التقييم السلبي -->
            <button onclick="handleFeedback('negative')" class="btn btn-negative">
                <span class="icon">😞</span>
                لدي ملاحظات
            </button>
        </div>
    </div>

    <script>
        // الإعدادات - ضع روابطك هنا
        const googleMapsUrl = "https://maps.app.goo.gl/YourLinkHere"; // رابط جوجل مابس الخاص بك
        const whatsappNumber = "201000000000"; // رقم الواتساب بالصيغة الدولية (بدون +)
        const message = "مرحباً، لدي شكوى أو ملاحظة بخصوص الخدمة:"; // نص الرسالة التلقائية

        function handleFeedback(type) {
            if (type === 'positive') {
                // تحويل لخرائط جوجل مباشرة
                window.location.href = googleMapsUrl;
            } else {
                // تحويل للواتساب للإدارة
                const fullWhatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
                window.location.href = fullWhatsappUrl;
            }
        }
    </script>

</body>
</html>
