<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم الطيب</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505 url('https://www.transparenttextures.com/patterns/stardust.png'); /* خلفية نجوم بسيطة */
            font-family: sans-serif;
            overflow: hidden;
        }

        .main-container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        /* تنسيق الصورة الشخصية مكان اللوجو */
        .logo {
            width: 150px;
            height: 150px;
            margin-bottom: 50px;
            border-radius: 50%;
            border: 3px solid #f1c40f;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
            object-fit: cover; /* لضمان عدم تشويه الصورة */
            margin-left: auto;
            margin-right: auto;
            display: block;
        }

        .buttons-wrap {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            color: white;
        }

        /* زر إيجابي - أخضر */
        .positive {
            background-color: #27ae60;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        /* زر سلبي - أحمر */
        .negative {
            background-color: #e74c3c;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-wrap">
            <img src="https://r.jina.ai/i/3482d8d85f79435cb7468eb9f315a653" alt="كريم" class="logo">
        </div>

        <div class="buttons-wrap">
            <a href="https://search.google.com/local/writereview?placeid=ChIJq-FYuPQ5WBQRaAhFrbMTaLI" class="btn positive">إيجابي 👍</a>

            <a href="https://wa.me/201016944198?text=عندي%20شكوي%20:%20" class="btn negative">سلبي 👎</a>
        </div>
    </div>

</body>
</html>
